server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: control-finance
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/control_finance}
  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

app:
  security:
    jwt:
      secret: ${APP_JWT_SECRET:change-me-change-me-change-me-change-me}
      refresh-secret: ${APP_JWT_REFRESH_SECRET:change-me-refresh-change-me-refresh-change-me}
      access-ttl-minutes: ${APP_JWT_ACCESS_TTL_MINUTES:15}
      refresh-ttl-days: ${APP_JWT_REFRESH_TTL_DAYS:30}
    encryption:
      key-base64: ${APP_ENCRYPTION_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    org.springframework.security: INFO
